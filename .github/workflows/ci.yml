name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: mix brain.dev_history derives the per-PR view from the
          # first-parent merge graph (its --check skips itself on shallow clones).
          fetch-depth: 0

      # Workflow hygiene: lint the workflow files themselves. CI-only by design —
      # the subject exists only here, so the offline-mix-suite rule doesn't apply
      # (see the elixir-coding-standards policy's admission rule).
      - name: Workflow files lint (actionlint)
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "25"
          elixir-version: "1.14"

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Format check
        run: mix format --check-formatted

      - name: No compile-time coupling between modules
        run: mix xref graph --label compile-connected --fail-above 0

      - name: Tests (warnings as errors)
        run: mix test --warnings-as-errors

      - name: CLAUDE.md is compiled and current
        run: mix brain.contract --check

      - name: Registry is compiled and current
        run: mix brain.registry --check

      - name: Code map is compiled and current
        run: mix brain.codemap --check

      - name: Bundle verifies (ids, evidence edges, grounding)
        run: mix brain.verify

      - name: Route tags verify (tags, refs, sink logs, log fidelity)
        run: mix brain.route_tags

      - name: Glossary verifies (descriptions, index sync, body dedup)
        run: mix brain.glossary

      - name: Flow lineage views are derived and current
        run: mix brain.lineage --check

      - name: Dev history is consistent with the merge graph (lag-tolerant)
        run: mix brain.dev_history --check

      - name: Dedup recall probe (report only — recall is a trend metric, non-gating)
        continue-on-error: true
        run: mix brain.dedup_probe

      - name: Static site builds
        run: mix brain.site
